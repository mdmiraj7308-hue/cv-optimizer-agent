name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Lint (fatal errors only)
        run: ruff check --select E9,F63,F7,F82 .

      - name: Byte-compile sources
        run: python -m compileall -q app.py backend.py streamlit_app.py src

      - name: Build Docker image
        run: docker build -t cv-optimizer-agent .
